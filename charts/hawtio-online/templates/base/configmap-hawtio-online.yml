apiVersion: v1
data:
  hawtconfig.json: |
    {
      "about": {
        "title": "Hawtio Online Console",
        "productInfo": [],
        "description": "The Hawtio Online Console eases the discovery and management of 'hawtio-enabled' applications deployed on Kubernetes/OpenShift.",
        "copyright": "",
        "imgSrc": "/online/hawtio-logo.svg",
        "imgDarkModeSrc": "/online/hawtio-logo.svg"
      },
      "branding": {
        "appName": "Hawtio Online Console",
        "showAppName": "true",
        "appLogoUrl": "/online/hawtio-logo.svg",
        "appLogoDarkModeUrl": "/online/hawtio-logo.svg",
        "favicon": "/online/favicon.ico"
      },
      "disabledRoutes": ["connect"]
    }
kind: ConfigMap
metadata:
  name: {{ .Values.online.name }}
  namespace: {{ .Release.Namespace }}
  labels:
{{ include "hawtio-online.app.labels" .Values.online | indent 4 }}
